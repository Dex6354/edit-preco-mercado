<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Preços</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --bg-color: #212121;
            --card-color: #2c2c2c;
            --text-color: #f0f0f0;
            --secondary-text-color: #a0a0a0;
            --primary-color: #ffc107;
            --green-highlight: #4CAF50;
            --danger-color: #f44336;
            --border-radius: 12px;
            --input-bg-color: #383838;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .section {
            background-color: var(--card-color);
            padding: 20px 16px;
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 600px;
            margin: 24px auto;
        }

        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-header h2 { margin: 0; font-size: 1.5rem; color: var(--primary-color); }
        .collapsible-header .fas.fa-chevron-down { transition: transform 0.3s ease; color: var(--secondary-text-color); }
        .collapsible-header.active .fas.fa-chevron-down { transform: rotate(180deg); }
        
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .collapsible-content.expanded { max-height: 100vh; padding-top: 20px; }

        .manager-form { display: flex; flex-direction: column; gap: 12px; }
        .manager-select, .auth-input { width: 100%; padding: 12px; background-color: var(--input-bg-color); border: 1px solid #444; border-radius: 8px; color: var(--text-color); font-size: 1rem; }
        
        .custom-btn { background-color: var(--primary-color); color: var(--bg-color); border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; padding: 12px; width: 100%; transition: 0.3s; }
        .custom-btn:hover { background-color: #ffd54f; }

        #sync-status-indicator { width: 12px; height: 12px; border-radius: 50%; background-color: var(--green-highlight); }
        .status-syncing { background-color: var(--primary-color) !important; }
        .status-error { background-color: var(--danger-color) !important; }
        .status-saved { background-color: var(--green-highlight) !important; }
    </style>
</head>
<body>

    <div class="section">
        <div class="collapsible-header" onclick="toggleItemManager()">
            <h2>Gerenciar Itens (Preço Fixo)</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="sync-status-indicator" class="status-saved"></div>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        <div id="item-manager-content" class="collapsible-content">
            <div class="manager-form">
                <select id="manager-item-select" class="manager-select" onchange="carregarPrecosItemManager()">
                    <option value="">Selecione um item da lista...</option>
                </select>
                <input type="text" id="manager-price-geral" class="auth-input" placeholder="Preço Geral (R$ 0,00)" onblur="formatCurrency(this)">
                <button class="custom-btn" onclick="atualizarPrecoFixo()">
                    <i class="fas fa-save"></i> Salvar Preço Fixo
                </button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ALTERE AQUI COM A URL DO SEU WORKER QUE VOCÊ COPIOU NO PASSO 2
        const WORKER_URL = 'https://meumercado-api.9f3c7a5d2e6b4f8a1c0d9e7b3a2f6c5d8e1a4b7c9d0f3e6a5b2c1g3-onion.workers.dev'; 
        let itensList = [];

        function setSyncStatus(state) {
            const indicator = document.getElementById('sync-status-indicator');
            if (indicator) indicator.className = `status-${state}`;
        }

        function toggleItemManager() {
            document.querySelector('.collapsible-header').classList.toggle('active');
            document.getElementById('item-manager-content').classList.toggle('expanded');
        }

        async function carregarItens() {
            setSyncStatus('syncing');
            try {
                const response = await fetch(WORKER_URL); 
                if (!response.ok) throw new Error();
                itensList = await response.json();
                popularSelectItemManager();
                setSyncStatus('saved');
            } catch (error) {
                console.error(error);
                setSyncStatus('error');
            }
        }

        function popularSelectItemManager() {
            const select = document.getElementById('manager-item-select');
            select.innerHTML = '<option value="">Selecione um item da lista...</option>';
            itensList.forEach(item => {
                if (item.nome) {
                    const opt = document.createElement('option');
                    opt.value = item.nome;
                    opt.textContent = item.nome;
                    select.appendChild(opt);
                }
            });
        }

        function carregarPrecosItemManager() {
            const select = document.getElementById('manager-item-select');
            const precoInput = document.getElementById('manager-price-geral');
            const itemSelecionado = itensList.find(item => item.nome === select.value);
            
            if (itemSelecionado) {
                const match = itemSelecionado.nome.match(/(.*?)\s+(R\$\s*[\d,.]+)/i);
                precoInput.value = match ? match[2].trim() : '';
            } else {
                precoInput.value = '';
            }
        }

        async function atualizarPrecoFixo() {
            const select = document.getElementById('manager-item-select');
            const nomeItemCompleto = select.value;
            const novoPreco = document.getElementById('manager-price-geral').value.trim();

            if (!nomeItemCompleto) {
                alert('Por favor, selecione um item primeiro.');
                return;
            }

            setSyncStatus('syncing');
            const itemIndex = itensList.findIndex(i => i.nome === nomeItemCompleto);
            if (itemIndex === -1) return setSyncStatus('error');

            const match = nomeItemCompleto.match(/(.*?)\s+(R\$\s*[\d,.]+)/i);
            const nomeBase = match ? match[1].trim() : nomeItemCompleto.trim();
            const novoNomeCompleto = novoPreco ? `${nomeBase} ${novoPreco}` : nomeBase;

            itensList[itemIndex].nome = novoNomeCompleto;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(itensList)
                });

                if (!response.ok) throw new Error();

                setSyncStatus('saved');
                alert(`Preço de "${nomeBase}" atualizado com sucesso!`);
                popularSelectItemManager();
                document.getElementById('manager-price-geral').value = '';
            } catch (error) {
                setSyncStatus('error');
                alert('Erro ao salvar no servidor KV.');
            }
        }

        function formatCurrency(input) {
            const value = input.value.trim();
            const number = parseFloat(value.replace('R$', '').trim().replace('.', '').replace(',', '.'));
            if (isNaN(number) || number === 0) {
                input.value = '';
            } else {
                input.value = number.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
        }

        document.addEventListener('DOMContentLoaded', carregarItens);
    </script>
</body>
</html>
